experiment:
  name: "real_movielens"
  steps: 1000
  n_runs: 5
  seed: 42

environment:
  name: "DatasetEnvironment"
  params:
    dataset_path: "mab_framework/data/movielens_bandit_5000.csv"

algorithms:
  - name: "ThompsonSampling"
    display_name: "Thompson Sampling"
    params: {}
    model:
      name: "OnlineRidgeRegression"
      params: { l2_reg: 1.0 }
      one_model_per_arm: true

  - name: "UCBAlgorithm"
    display_name: "LinUCB (alpha=1.0)"
    params: { alpha: 1.0 }
    model:
      name: "OnlineRidgeRegression"
      params: { l2_reg: 1.0 }
      one_model_per_arm: true

  - name: "EpsilonGreedy"
    display_name: "Eps-Greedy (eps=0.1)"
    params: { epsilon: 0.1 }
    model:
      name: "OnlineRidgeRegression"
      params: { l2_reg: 1.0 }
      one_model_per_arm: true

  - name: "SGDTSBandit"
    display_name: "SGD-TS"
    params:
      d: 43
      K: 5
      nu: 0.1
      lr: 0.01
      warmup_steps: 50

  - name: "BootstrapTSBandit"
    display_name: "Bootstrap TS"
    params:
      d: 43
      n_models: 10
      lr: 0.01

  - name: "NonContextualTSBandit"
    display_name: "Non-Contextual TS"
    params:
      prior_mean: 0.0
      prior_var: 1.0
      reward_var: 1.0

metrics:
  - cumulative_regret
  - average_regret

output:
  save_path: "./results/real_movielens"
