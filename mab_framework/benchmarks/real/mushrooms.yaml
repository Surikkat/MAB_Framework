experiment:
  name: "mushrooms"
  steps: 1000
  n_runs: 10
  seed: 42

environment:
  name: "DatasetEnvironment"
  params:
    dataset_path: "mab_framework/data/mushroom_bandit_5000.csv"

algorithms:
  - name: "ThompsonSampling"
    display_name: "Thompson Sampling"
    params: {}
    model:
      name: "OnlineRidgeRegression"
      params: { l2_reg: 1.0 }
      one_model_per_arm: true

  - name: "UCBAlgorithm"
    display_name: "LinUCB (alpha=1.0)"
    params: { alpha: 1.0 }
    model:
      name: "OnlineRidgeRegression"
      params: { l2_reg: 1.0 }
      one_model_per_arm: true

  - name: "EpsilonGreedy"
    display_name: "Eps-Greedy (eps=0.1)"
    params: { epsilon: 0.1 }
    model:
      name: "OnlineRidgeRegression"
      params: { l2_reg: 1.0 }
      one_model_per_arm: true

metrics:
  - cumulative_regret
  - average_regret

output:
  save_path: "./results/mushrooms"
